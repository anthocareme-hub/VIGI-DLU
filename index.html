<title>VIGIE DLU</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
<style>
  :root{
    --bg:#EDEFEA; --surface:#FFFFFF; --ink:#1B2A2E; --ink-muted:#5B6B6C;
    --brand:#2B4C56; --brand-dark:#1D363E; --line:#D8DCD3;
    --red:#B8433C;   --red-bg:#F7E6E4;
    --amber:#B9791F; --amber-bg:#FBF0DD;
    --green:#3F7D53; --green-bg:#E7F1E8;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--sans);}
  @media (prefers-reduced-motion: reduce){ *{animation:none!important;transition:none!important;} }
  #app{max-width:520px;margin:0 auto;min-height:100vh;background:var(--bg);display:flex;flex-direction:column;padding-bottom:96px;}

  header.top{background:var(--brand);color:#fff;padding:18px 18px 14px;position:sticky;top:0;z-index:20;}
  .wordmark{font-family:var(--mono);font-weight:700;letter-spacing:.12em;font-size:19px;text-transform:uppercase;}
  .subtitle{font-size:12px;color:#BFD2D3;margin-top:2px;letter-spacing:.02em;}

  .navbar{position:sticky;top:0;z-index:19;background:var(--brand-dark);color:#fff;padding:16px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:15px;min-height:24px;}
  .navbar .crumb{opacity:.6;font-size:14px;}
  .navbar .current{font-weight:700;font-family:var(--mono);font-size:16px;}
  .navbar button.link{
    background:rgba(255,255,255,.15);
    border:none;
    color:#fff;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    padding:11px 18px;
    border-radius:11px;
    font-family:var(--sans);
  }
  .navbar button.link:active{ background:rgba(255,255,255,.28); }
  .navbar .spacer{flex:1;}

  .alertbar{margin:14px 16px 0;padding:12px 14px;border-radius:10px;font-size:13.5px;line-height:1.4;}
  .alertbar.has-red{background:var(--red-bg);color:var(--red);border:1px solid #e6c3bf;}
  .alertbar.ok{background:var(--green-bg);color:var(--green);border:1px solid #cfe3d2;}

  main{flex:1;padding:14px 16px 0;}
  .empty{text-align:center;color:var(--ink-muted);padding:60px 20px;font-size:14px;line-height:1.6;}
  .footlink{text-align:center;padding:24px 0 8px;}
  .footlink button{background:none;border:none;color:var(--ink-muted);font-size:12px;text-decoration:underline;cursor:pointer;}

  /* accueil */
  .homewrap{padding-top:6px;}
  .homeimg{width:100%;aspect-ratio:1/1;border-radius:18px;overflow:hidden;background:var(--surface);display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.08);cursor:pointer;}
  .homeimg img{width:100%;height:100%;object-fit:cover;display:block;}
  .homeimg-placeholder{color:var(--ink-muted);font-size:13px;text-align:center;padding:20px;line-height:1.5;}
  .link-change{display:block;text-align:center;background:none;border:none;color:var(--brand);font-size:12.5px;text-decoration:underline;margin:12px auto 24px;cursor:pointer;}
  .homebtns{display:flex;flex-direction:column;gap:12px;}
  .homebtns button{padding:18px;border-radius:14px;font-size:15.5px;font-weight:700;border:none;cursor:pointer;font-family:var(--sans);}
  .homebtns .hp{background:var(--brand);color:#fff;}
  .homebtns .hs{background:var(--surface);color:var(--brand);border:1.5px solid var(--brand);}

  /* kits */
  .kitcard{background:var(--surface);border:1.5px solid rgba(43,76,86,.22);border-radius:10px;margin-bottom:10px;padding:12px 14px;box-shadow:0 1px 2px rgba(0,0,0,.04);display:flex;align-items:center;gap:10px;cursor:pointer;}
  .kitcard .reorder{display:flex;flex-direction:column;gap:3px;}
  .orderbtn{background:var(--bg);border:none;border-radius:6px;width:26px;height:22px;font-size:11px;cursor:pointer;color:var(--ink-muted);line-height:1;}
  .orderbtn:disabled{opacity:.3;cursor:default;}
  .kitcard .kinfo{flex:1;min-width:0;}
  .kitcard .kname{font-weight:600;font-size:15px;}
  .kitcard .kmeta{font-family:var(--mono);font-size:11.5px;color:var(--ink-muted);margin-top:3px;}
  .kitcard .kbadges{display:flex;gap:6px;align-items:center;}
  .pill{font-family:var(--mono);font-weight:700;font-size:11px;padding:4px 7px;border-radius:6px;}
  .pill.st-red{background:var(--red-bg);color:var(--red);}
  .pill.st-amber{background:var(--amber-bg);color:var(--amber);}
  .kitcard .editbtn{background:none;border:none;font-size:15px;color:var(--ink-muted);cursor:pointer;padding:6px;}

  /* produits */
  .loc-title{font-family:var(--mono);font-weight:700;font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-muted);margin:18px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--line);}
  .loc-title:first-child{margin-top:0;}
  .part-tab{
    display:inline-flex;align-items:center;gap:6px;
    background:var(--brand);color:#fff;
    font-family:var(--mono);font-weight:700;font-size:12px;letter-spacing:.04em;
    padding:8px 16px;border-radius:10px 10px 0 0;
    margin-left:4px;margin-bottom:-1px;
    position:relative;z-index:1;
  }
  .part-tab:first-of-type{ margin-top:2px; }
  .part-folder{
    border:1.5px solid var(--brand);
    border-radius:0 12px 12px 12px;
    padding:12px 11px 4px;
    background:rgba(43,76,86,.035);
    margin-bottom:18px;
  }
  .part-folder .item{ box-shadow:none; }
  .item{background:var(--surface);border-radius:10px;margin-bottom:10px;padding:12px 14px;display:flex;gap:12px;align-items:center;border-left:6px solid var(--line);box-shadow:0 1px 2px rgba(0,0,0,.04);}
  .item.st-red{border-left-color:var(--red);}
  .item.st-amber{border-left-color:var(--amber);}
  .item.st-green{border-left-color:var(--green);}
  .item .info{flex:1;min-width:0;}
  .item .name{font-weight:600;font-size:14.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .item .dose{font-size:12px;color:var(--ink-muted);margin-top:2px;}
  .item .location{font-size:12px;color:var(--brand);margin-top:2px;}
  .item .checked{font-size:11px;color:var(--green);margin-top:2px;}
  .chiprow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
  .chip{background:var(--bg);border:1.5px solid var(--line);color:var(--brand);font-size:13px;font-weight:600;padding:8px 14px;border-radius:20px;cursor:pointer;font-family:var(--sans);}
  .chip:active{background:var(--brand);color:#fff;border-color:var(--brand);}
  .item .meta{font-family:var(--mono);font-size:11.5px;color:var(--ink-muted);margin-top:3px;}
  .item .qty{font-family:var(--mono);font-size:11.5px;color:var(--ink-muted);}
  .badge{font-family:var(--mono);font-weight:700;font-size:12px;padding:5px 8px;border-radius:6px;white-space:nowrap;}
  .badge.st-red{background:var(--red-bg);color:var(--red);}
  .badge.st-amber{background:var(--amber-bg);color:var(--amber);}
  .badge.st-green{background:var(--green-bg);color:var(--green);}
  .item .del{background:none;border:none;color:var(--ink-muted);font-size:16px;cursor:pointer;padding:4px 6px;}

  .fab{position:fixed;left:50%;transform:translateX(-50%);bottom:22px;max-width:520px;width:calc(100% - 32px);display:flex;gap:10px;z-index:25;}
  .fab button{flex:1;border:none;border-radius:12px;padding:15px;font-size:14.5px;font-weight:600;cursor:pointer;font-family:var(--sans);}
  .fab .primaryfab{background:var(--brand);color:#fff;}

  .modal-overlay{position:fixed;inset:0;background:rgba(20,30,32,.55);display:flex;align-items:flex-end;justify-content:center;z-index:50;}
  .modal{background:var(--surface);width:100%;max-width:520px;border-radius:16px 16px 0 0;padding:20px 18px 24px;max-height:88vh;overflow-y:auto;}
  .modal h2{font-size:16px;margin:0 0 14px;letter-spacing:.01em;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;color:var(--ink-muted);margin-bottom:5px;font-weight:600;}
  .field input{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:8px;font-size:14.5px;font-family:var(--sans);background:#fff;color:var(--ink);}
  .field input:focus{outline:2px solid var(--brand);outline-offset:1px;}
  .row2{display:flex;gap:10px;}
  .row2 .field{flex:1;}
  .modalbtns{display:flex;gap:10px;margin-top:16px;}
  .modalbtns button{flex:1;border:none;border-radius:9px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--sans);}
  .btn-primary{background:var(--brand);color:#fff;}
  .btn-secondary{background:var(--bg);color:var(--ink-muted);}
  .btn-danger{background:var(--red-bg);color:var(--red);}
  .hint{font-size:11.5px;color:var(--ink-muted);margin-top:-4px;margin-bottom:12px;line-height:1.4;}
  .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--brand-dark);color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;z-index:60;max-width:80%;text-align:center;}
</style>
</head>

const LS_PREFIX = 'vigie:';
let lastStorageError = '';
function storGet(key){
  try{ const raw = localStorage.getItem(LS_PREFIX+key); return raw ? JSON.parse(raw) : null; }
  catch(e){ console.error('lecture locale impossible', key, e); return null; }
}
function storSet(key, value){
  try{ localStorage.setItem(LS_PREFIX+key, JSON.stringify(value)); return true; }
  catch(e){ console.error('écriture locale impossible', key, e); lastStorageError = (e&&e.message)?e.message:String(e); return false; }
}
function storDelete(key){ try{ localStorage.removeItem(LS_PREFIX+key); }catch(e){} }
function saveFailToast(){ toast("Échec de l'enregistrement" + (lastStorageError ? ' ('+lastStorageError+')' : '') + ' — réessaie'); }

function closeModal(){ modalRoot.innerHTML = ''; }
function toast(msg){
  const t = document.createElement('div');
  t.className='toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2400);
}
function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function formatDateFr(iso){ const [y,m] = iso.split('-'); return `${m}/${y}`; }
function formatDateFrFull(iso){ const [y,m,d] = iso.split('-'); return `${d}/${m}/${y}`; }
function todayISO(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function doseLine(it){
  const parts = [];
  if(it.mg) parts.push(it.mg+' mg');
  if(it.ml) parts.push(it.ml+' ml');
  return parts.join(' · ');
}
function groupByPart(itemsList){
  const groups = {};
  itemsList.forEach(it=>{
    const key = (it.location||'').trim();
    if(!groups[key]) groups[key] = [];
    groups[key].push(it);
  });
  const keys = Object.keys(groups).sort((a,b)=>{
    if(a==='' && b==='') return 0;
    if(a==='') return 1;   // "Sans partie" toujours en dernier
    if(b==='') return -1;
    return a.localeCompare(b,'fr',{sensitivity:'base'});
  });
  keys.forEach(k=> groups[k].sort((a,b)=>a.name.localeCompare(b.name,'fr',{sensitivity:'base'})));
  return keys.map(k=>({partName: k || 'Sans partie', items: groups[k]}));
}
function getKnownParts(){ return storGet('known-parts') || []; }
function rememberPart(name){
  if(!name) return;
  const parts = getKnownParts();
  if(!parts.includes(name)){
    parts.push(name);
    storSet('known-parts', parts);
  }
}
function getRecentPartsForKit(kitId){ return storGet('recent-parts:'+kitId) || []; }
function rememberRecentPartForKit(kitId, name){
  if(!name) return;
  let list = getRecentPartsForKit(kitId).filter(p=>p!==name);
  list.unshift(name);
  list = list.slice(0,3);
  storSet('recent-parts:'+kitId, list);
}

function showConfirm(message){
  return new Promise(resolve=>{
    modalRoot.innerHTML = `<div class="modal-overlay"><div class="modal">
      <h2>Confirmer</h2>
      <div class="hint" style="margin-bottom:16px;">${escapeHtml(message)}</div>
      <div class="modalbtns">
        <button class="btn-secondary" id="confirmNoBtn">Annuler</button>
        <button class="btn-danger" id="confirmYesBtn">Confirmer</button>
      </div>
    </div></div>`;
    document.getElementById('confirmNoBtn').addEventListener('click', ()=>{ closeModal(); resolve(false); });
    document.getElementById('confirmYesBtn').addEventListener('click', ()=>{ closeModal(); resolve(true); });
  });
}

/* ---------- Statut de péremption ---------- */
/* ---------- Statut de péremption ----------
   Les dates sont saisies en mois/année : un produit "08/2026" reste valide
   jusqu'au dernier jour d'août 2026, pas juste jusqu'au 1er du mois. */
function daysUntil(dateStr){
  const today = new Date(); today.setHours(0,0,0,0);
  const [y, m] = dateStr.split('-').map(n=>parseInt(n,10));
  const lastDayOfMonth = new Date(y, m, 0); // jour 0 du mois suivant = dernier jour du mois indiqué
  return Math.round((lastDayOfMonth - today) / 86400000);
}
function statusFor(dateStr){
  if(!dateStr) return {cls:'st-amber', label:'DATE ?'};
  const days = daysUntil(dateStr);
  if(days < 0) return {cls:'st-red', label:'PÉRIMÉ', days};
  if(days <= 30) return {cls:'st-amber', label:'J-'+days, days};
  return {cls:'st-green', label:'J-'+days, days};
}
function countAlerts(list){
  let red=0, amber=0;
  (list||[]).forEach(it=>{ const s=statusFor(it.expiry); if(s.cls==='st-red') red++; else if(s.cls==='st-amber') amber++; });
  return {red, amber};
}

function handleHomeImageChange(e){
  const file = e.target.files && e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    const img = new Image();
    img.onload = function(){
      const maxSide = 900;
      const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
      const w = Math.round(img.width*scale), h = Math.round(img.height*scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.82);
      const ok = storSet('home-image', dataUrl);
      if(!ok) saveFailToast(); else toast('Image mise à jour');
      renderAll();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function rowsFromItems(kitName, kitItems){
  return kitItems.map(it=>{
    const s = statusFor(it.expiry);
    const statusLabel = s.cls==='st-red' ? 'Périmé' : (s.cls==='st-amber' ? 'À changer' : 'OK');
    return [kitName, it.name, it.mg?it.mg+' mg':'—', it.ml?it.ml+' ml':'—', it.location||'—', String(it.qty||1), it.expiry?formatDateFr(it.expiry):'—', statusLabel, it.modifiedDate?formatDateFrFull(it.modifiedDate):'—'];
  });
}

function generatePDFTable(title, rows){
  if(typeof window.jspdf === 'undefined'){
    toast("Le générateur PDF n'a pas pu se charger (vérifie ta connexion) — réessaie.");
    return;
  }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait' });
  doc.setFontSize(14);
  doc.text(title, 14, 15);
  doc.setFontSize(9);
  doc.setTextColor(120);
  doc.text('Généré le '+new Date().toLocaleDateString('fr-FR'), 14, 21);
  doc.autoTable({
    startY: 26,
    head: [['Kit','Produit','mg','ml','Emplacement','Qté','Péremption','Statut','Modifié le']],
    body: rows.length ? rows : [['—','Aucun produit','—','—','—','—','—','—','—']],
    styles:{ fontSize:8, cellPadding:3 },
    headStyles:{ fillColor:[43,76,86] },
    alternateRowStyles:{ fillColor:[237,239,234] },
  });

  const filename = 'vigie-dlu-'+new Date().toISOString().slice(0,10)+'.pdf';
  const blob = doc.output('blob');

  (async ()=>{
    try{
      if(navigator.canShare){
        const file = new File([blob], filename, {type:'application/pdf'});
        if(navigator.canShare({files:[file]})){
          await navigator.share({files:[file], title});
          return;
        }
      }
    }catch(e){ /* on retombe sur le repli ci-dessous */ }
    const url = URL.createObjectURL(blob);
    window.open(url, '_blank');
  })();
}

function exportPDF(){
  let rows = [];
  kitsIndex.forEach(k=>{
    const kitItems = (storGet('stock:'+k.id) || []).slice().sort((a,b)=>a.name.localeCompare(b.name,'fr',{sensitivity:'base'}));
    rows = rows.concat(rowsFromItems(k.name, kitItems));
  });
  generatePDFTable('VIGIE DLU — Détail des kits', rows);
}

function exportUrgentPDF(){
  const groups = computeUrgentGroups();
  let rows = [];
  groups.forEach(g=> rows = rows.concat(rowsFromItems(g.kitName, g.items)));
  generatePDFTable('VIGIE DLU — Produits à changer', rows);
}

function exportKitPDF(){
  const sortedItems = [...items].sort((a,b)=>a.name.localeCompare(b.name,'fr',{sensitivity:'base'}));
  const rows = rowsFromItems(currentKitName, sortedItems);
  generatePDFTable('VIGIE DLU — '+currentKitName, rows);
}

/* ---------- Sauvegarde / restauration (indépendant de l'hébergement) ---------- */
function gatherAllData(){
  const data = {};
  Object.keys(localStorage).forEach(k=>{
    if(k.startsWith(LS_PREFIX)) data[k.slice(LS_PREFIX.length)] = localStorage.getItem(k);
  });
  return data;
}
function restoreAllData(data){
  Object.keys(data).forEach(k=> localStorage.setItem(LS_PREFIX+k, data[k]));
}
async function exportBackup(){
  const data = gatherAllData();
  const json = JSON.stringify(data, null, 2);
  const filename = 'vigie-dlu-sauvegarde-'+new Date().toISOString().slice(0,10)+'.json';
  try{
    if(navigator.canShare){
      const file = new File([json], filename, {type:'application/json'});
      if(navigator.canShare({files:[file]})){
        await navigator.share({files:[file], title:'Sauvegarde VIGIE DLU'});
        return;
      }
    }
  }catch(e){ /* on retombe sur le repli texte ci-dessous */ }
  showBackupTextModal(json);
}

  modalRoot.innerHTML = `<div class="modal-overlay"><div class="modal">

function showImportModal(){
  modalRoot.innerHTML = `<div class="modal-overlay"><div class="modal">
    <h2>Restaurer une sauvegarde</h2>
    <div class="hint">Sélectionne un fichier .json exporté précédemment avec "Exporter une sauvegarde". Cela remplace les données actuelles sur cet appareil.</div>
    <input type="file" id="restoreFileInput" accept="application/json,.json">
    <div class="modalbtns"><button class="btn-secondary" id="cancelRestoreBtn" style="flex:1">Annuler</button></div>

  document.getElementById('cancelRestoreBtn').addEventListener('click', closeModal);

    const file = e.target.files && e.target.files[0];

function moveKit(kitId, direction){
  const idx = kitsIndex.findIndex(k=>k.id===kitId);
  if(idx===-1) return;
  const swapWith = idx + direction;
  if(swapWith<0 || swapWith>=kitsIndex.length) return;
  [kitsIndex[idx], kitsIndex[swapWith]] = [kitsIndex[swapWith], kitsIndex[idx]];
  const ok = storSet('kits', kitsIndex);
  if(!ok) saveFailToast();
  renderAll();
}

/* ---------- "À changer" : produits urgents groupés par emplacement ---------- */
function computeUrgentGroups(){
  const groups = [];
  kitsIndex.forEach(k=>{
    const kitItems = storGet('stock:'+k.id) || [];
    const urgent = kitItems.filter(it=>{ const c = statusFor(it.expiry).cls; return c==='st-red' || c==='st-amber'; });
    if(urgent.length){
      urgent.sort((a,b)=> daysUntil(a.expiry) - daysUntil(b.expiry));
      groups.push({kitId:k.id, kitName:k.name, items:urgent});
    }
  });
  groups.sort((a,b)=> a.kitName.localeCompare(b.kitName,'fr',{sensitivity:'base'}));
  return groups;
}

function renderUrgentList(){
  fabZone.innerHTML = '';
  alertZone.innerHTML = '';
  const groups = computeUrgentGroups();
  if(!groups.length){
    mainZone.innerHTML = '<div class="empty">Rien à changer dans les 30 prochains jours 🎉</div>';
    return;
  }
  mainZone.innerHTML = `<button class="primaryfab" id="exportUrgentPdfBtn" style="width:100%;margin-bottom:16px;">📄 Générer le PDF de cette liste</button>` +
  groups.map(g => `
    <div class="loc-title">${escapeHtml(g.kitName)}</div>
    ${g.items.map(it=>{
      const s = statusFor(it.expiry);
      const dl = doseLine(it);
      return `<div class="item ${s.cls}" data-kitid="${g.kitId}" data-itemid="${it.id}" style="cursor:pointer;">
        <div class="info">

        <div class="badge ${s.cls}">${s.label}</div>
      </div>`;
    }).join('')}
  `).join('');

  document.getElementById('exportUrgentPdfBtn').addEventListener('click', exportUrgentPDF);
  mainZone.querySelectorAll('.item').forEach(el=>{
    el.addEventListener('click', ()=> openItemFromUrgent(el.dataset.kitid, el.dataset.itemid));

  prefill = prefill || {};
  modalRoot.innerHTML = `<div class="modal-overlay"><div class="modal">
    <h2>${prefill.id ? 'Modifier le produit' : 'Ajouter un produit'}</h2>
    <div class="field">
      <label>Nom du produit *</label>
      <input type="text" id="f-name" value="${escapeHtml(prefill.name||'')}" placeholder="ex. Doliprane">
    </div>
    <div class="row2">
      <div class="field">
        <label>Dosage (mg) — optionnel</label>
        <input type="number" step="any" id="f-mg" value="${escapeHtml(prefill.mg||'')}" placeholder="ex. 500">
      </div>
      <div class="field">
        <label>Volume (ml) — optionnel</label>
        <input type="number" step="any" id="f-ml" value="${escapeHtml(prefill.ml||'')}" placeholder="ex. 20">
      </div>
    </div>
    <div class="field">
      <label>Partie du kit — optionnel</label>
      ${getRecentPartsForKit(currentKitId).length ? `<div class="chiprow">
        ${getRecentPartsForKit(currentKitId).map(p=>`<button type="button" class="chip" data-part="${escapeHtml(p)}">${escapeHtml(p)}</button>`).join('')}
      </div>` : ''}
      <input type="text" id="f-location" list="partsList" value="${escapeHtml(prefill.location||'')}" placeholder="ex. Compartiment médicaments">
      <datalist id="partsList">
        ${getKnownParts().map(p=>`<option value="${escapeHtml(p)}">`).join('')}
      </datalist>
    </div>
    <div class="row2">
      <div class="field">
        <label>Mois de péremption *</label>
        <input type="month" id="f-expiry" value="${(prefill.expiry||'').slice(0,7)}">
      </div>
      <div class="field">
        <label>Quantité</label>
        <input type="number" id="f-qty" min="1" value="${prefill.qty||1}">
      </div>
    </div>
    ${prefill.id ? `
    <div class="modalbtns">
      <button class="btn-secondary" id="dynamicBtn" style="flex:1">Quitter</button>
    </div>` : `
    <div class="modalbtns">
      <button class="btn-secondary" id="cancelFormBtn">Annuler</button>
      <button class="btn-primary" id="saveItemBtn">Enregistrer</button>
    </div>`}
  </div></div>`;

  const trackedIds = ['f-name','f-mg','f-ml','f-location','f-expiry','f-qty'];
  const initialSnapshot = trackedIds.map(id=>document.getElementById(id).value).join('|');
  function hasChanged(){ return trackedIds.map(id=>document.getElementById(id).value).join('|') !== initialSnapshot; }

  function doSave(){
    const name = document.getElementById('f-name').value.trim();
    const mg = document.getElementById('f-mg').value.trim();
    const ml = document.getElementById('f-ml').value.trim();
    const location = document.getElementById('f-location').value.trim();
    const expiry = document.getElementById('f-expiry').value;
    const qty = parseInt(document.getElementById('f-qty').value,10) || 1;
    if(!name){ toast('Le nom du produit est requis'); return; }
    if(!expiry){ toast('Le mois de péremption est requis'); return; }

    if(prefill.id){
      const it = items.find(i=>i.id===prefill.id);
      Object.assign(it, {name, mg, ml, location, expiry, qty, modifiedDate: todayISO()});
    } else {
      items.push({id: 'it_'+Date.now()+'_'+Math.random().toString(36).slice(2,7), name, mg, ml, location, expiry, qty, modifiedDate: todayISO()});
    }
    rememberPart(location);
    rememberRecentPartForKit(currentKitId, location);
    const ok = storSet('stock:'+currentKitId, items);
    if(!ok) saveFailToast();
    updateKitSummary();
    closeModal();
    renderAll();
    toast('Produit enregistré');
  }

  document.querySelectorAll('.chip').forEach(chip=>{
    chip.addEventListener('click', ()=>{
      document.getElementById('f-location').value = chip.dataset.part;
      refreshDynamicBtn();
    });
  });

  function refreshDynamicBtn(){
    const btn = document.getElementById('dynamicBtn');
    if(!btn) return;
    if(hasChanged()){
      btn.textContent = 'Enregistrer';
      btn.classList.remove('btn-secondary');
      btn.classList.add('btn-primary');
    } else {
      btn.textContent = 'Quitter';
      btn.classList.remove('btn-primary');
      btn.classList.add('btn-secondary');
    }
  }

  if(prefill.id){
    trackedIds.forEach(id=>{
      document.getElementById(id).addEventListener('input', refreshDynamicBtn);
      document.getElementById(id).addEventListener('change', refreshDynamicBtn);
    });
    document.getElementById('dynamicBtn').addEventListener('click', ()=>{
      if(hasChanged()) doSave(); else closeModal();
    });
  } else {
    document.getElementById('cancelFormBtn').addEventListener('click', closeModal);
    document.getElementById('saveItemBtn').addEventListener('click', doSave);
  }
}

/* ---------- Démarrage ---------- */
function seedDefaultDataIfEmpty(){
  // Ne s'exécute que si l'appareil n'a jamais été utilisé (aucune clé "kits" existante),
  // pour ne jamais écraser les données d'un appareil déjà en service.
  if(storGet('kits') !== null) return;
  try{
    const seed = JSON.parse(decodeURIComponent(escape(atob(SEED_DATA_B64))));
    storSet('kits', seed.kits);
    Object.keys(seed.stock).forEach(kitId=> storSet('stock:'+kitId, seed.stock[kitId]));
    Object.keys(seed.recentParts).forEach(kitId=> storSet('recent-parts:'+kitId, seed.recentParts[kitId]));
    storSet('known-parts', seed.knownParts);
  }catch(e){ console.error('Pré-remplissage impossible', e); }
}

(function init(){
  seedDefaultDataIfEmpty();
  kitsIndex = storGet('kits') || [];
  requestBadgePermissionOnce();
  view = 'home';
  renderAll();
})();
</script>
</body>
</html>
